services:
  # Node.js Backend Service
  - type: web
    name: nivaran-backend
    env: node
    rootDir: safeher-backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: ~18.18.0
      - key: PORT
        value: 10000
      - key: ML_SERVICE_URL
        value: http://nivaran-ml:10000

  # ML FastAPI Service
  - type: web
    name: nivaran-ml
    env: python
    rootDir: ml
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      # Add other necessary ML environment variables here
