services:
  # Node.js Backend Service
  - type: web
    name: nivaran-backend
    env: node
    plan: free
    rootDir: safeher-backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: '10000'
      - key: ML_SERVICE_URL
        value: 'http://nivaran-ml:10000'
      - key: GRAPHHOPPER_API_KEY
        sync: false

  # ML FastAPI Service
  - type: web
    name: nivaran-ml
    env: python
    plan: free
    rootDir: ml
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: '3.10.0'
      # Add other necessary ML environment variables here
